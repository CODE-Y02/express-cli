name: Release

on:
  push:
    branches:
      - main
      - next
      - "v*"
  pull_request:
    branches:
      - main
      - next
      - "v*"

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Type check
        run: pnpm run check-types

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Version and Publish
        run: |
          # If there are changesets, version them and commit
          if [ "$(ls .changeset/*.md 2>/dev/null | grep -v 'README.md')" ]; then
            echo "🚀 Changesets found. Versioning..."
            
            # Setup git
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            
            # Version packages
            pnpm changeset version
            
            # Commit and push back to main (with [skip ci] to avoid loops)
            git add .
            git commit -m "chore(release): version packages [skip ci]"
            git push origin main
          fi
          
          # Publish to NPM (only if not already published)
          echo "📦 Publishing to NPM..."
          pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
